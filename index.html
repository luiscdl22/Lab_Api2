<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRUD Productos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-light">

<div class="container mt-4">
    <h2 class="mb-4 text-center text-primary fw-bold">Gestion de Productos</h2>

    <div class="card shadow mb-4">
        <div class="card-header bg-primary text-white">Formulario de Producto</div>
        <div class="card-body">
            <input type="hidden" id="id">

            <div class="row g-3">
                <div class="col-md-3">
                    <label class="form-label">Codigo</label>
                    <input type="text" id="codigo" class="form-control" placeholder="Ej: P001">
                </div>
                <div class="col-md-3">
                    <label class="form-label">Producto</label>
                    <input type="text" id="producto" class="form-control" placeholder="Nombre del producto">
                </div>
                <div class="col-md-3">
                    <label class="form-label">Precio</label>
                    <input type="number" id="precio" class="form-control" min="0.01" step="0.01" placeholder="0.00">
                </div>
                <div class="col-md-3">
                    <label class="form-label">Cantidad</label>
                    <!-- ✅ CORRECTO: min="0" permite 0 en edición -->
                    <input type="number" id="cantidad" class="form-control" min="0" step="1" placeholder="0">
                </div>
            </div>

            <div class="mt-3 d-flex gap-2">
                <button class="btn btn-success" onclick="accionFormulario('Guardar')">Guardar</button>
                <button class="btn btn-warning" onclick="accionFormulario('Modificar')">Actualizar</button>
                <button class="btn btn-info text-white" onclick="accionFormulario('Buscar')">Buscar</button>
                <button class="btn btn-secondary" onclick="limpiarFormulario()">Limpiar</button>
            </div>

            <div id="alertBox" class="alert mt-3 d-none" role="alert"></div>
        </div>
    </div>

    <div class="card shadow">
        <div class="card-header bg-dark text-white">Lista de Productos</div>
        <div class="card-body p-0">
            <table class="table table-striped table-hover mb-0">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Codigo</th>
                        <th>Producto</th>
                        <th>Precio</th>
                        <th>Cantidad</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="tablaProductos">
                    <tr><td colspan="6" class="text-center">Cargando...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
